name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false

      - name: Build all targets
        run: |
          mkdir -p dist
          for target in "linux arm64" "linux amd64" "darwin arm64" "darwin amd64" "linux arm 7"; do
            set -- $target
            GOOS=$1 GOARCH=$2 GOARM=${3:-} CGO_ENABLED=0 go build -ldflags="-s -w" -o "dist/do-$1-$2${3:+-v$3}" .
            echo "Built dist/do-$1-$2${3:+-v$3}"
          done

      - name: Create release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEA_API: https://git.standke.dev/api/v1
          REPO: xanderstrike/do
          TAG: ${{ github.ref_name }}
        run: |
          # Create the release
          RELEASE_ID=$(curl -sS -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"${TAG}\",\"body\":\"Release ${TAG}\",\"draft\":false}" \
            "${GITEA_API}/repos/${REPO}/releases" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Created release ID: ${RELEASE_ID}"

          # Upload each binary as an asset
          for f in dist/*; do
            name=$(basename "$f")
            curl -sS -X POST \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$f" \
              "${GITEA_API}/repos/${REPO}/releases/${RELEASE_ID}/assets?name=${name}" > /dev/null
            echo "Uploaded ${name}"
          done
